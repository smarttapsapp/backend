<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Tap</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f7;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      padding: 20px 30px;
    }
    .header {
      text-align: center;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }
    .footer img {
      max-width: 120px;
    }
    h2 {
      color: #333;
    }
    p {
      font-size: 15px;
      color: #555;
    }
    .otp {
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      background: #007bff;
      padding: 12px 20px;
      border-radius: 6px;
      display: inline-block;
      margin: 15px 0;
    }
    .footer {
      font-size: 12px;
      text-align: center;
      color: #999;
      margin-top: 25px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
  </style>
</head>
